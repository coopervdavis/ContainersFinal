<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHL Teams</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --card-bg: #ffffff;
            --btn-bg: #e8e8ed;
            --btn-hover: #d2d2d7;
        }

        body {
            /* Apple's native system font stack */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 60px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin-bottom: 40px;
        }

        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        .filter-nav a {
            text-decoration: none;
        }

        .filter-btn {
            background-color: var(--btn-bg);
            color: var(--text-primary);
            border: none;
            border-radius: 980px; /* Perfect pill shape */
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background-color: var(--btn-hover);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 32px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .card img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin-bottom: 28px;
        }

        .card h3 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.005em;
            text-align: center;
        }

        .card p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NHL Teams</h1>
        
        <div class="filter-nav">
            <a href="?"><button class="filter-btn">All</button></a>
            {% for region in regions %}
                <a href="?region={{ region }}"><button class="filter-btn">{{ region }}</button></a>
            {% endfor %}
        </div>

        <div class="grid">
            {% for team in teams %}
                <div class="card">
                    <img src="{{ team.logo.url }}" alt="{{ team.name }} Logo">
                    <h3>{{ team.name }}</h3>
                    <p>{{ team.region }} Division</p>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
